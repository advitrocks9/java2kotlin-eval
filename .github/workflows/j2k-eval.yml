name: j2k-eval

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# CI runs the eval pipeline against committed corpora. The runner plugin
# (runner/) is intentionally NOT exercised here -- runIde under xvfb on
# ubuntu-latest hangs in IntelliJ Platform's preloadNonHeadlessServices
# before our ApplicationStarter ever dispatches. That's a real platform
# gap, documented with the idea.log evidence in docs/HEADLESS_J2K.md.
# Locally, on a fresh sandbox, the runner does complete end-to-end -- the
# committed fixtures under fixtures/edge-converted/ are its captured output.

jobs:
  newj2k-cross-check:
    name: newJ2k testData cross-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - run: bash scripts/fetch-newj2k-fixtures.sh
      - run: ./gradlew :eval:test
      - run: ./gradlew :eval:run --args="fixtures/newj2k reports/newj2k.md --isolated"
      - uses: actions/upload-artifact@v4
        with:
          name: newj2k-cross-check
          path: reports/

  edge-fixtures-eval:
    name: eval over committed runner output (fixtures/edge-converted)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      # Eval runs over the committed runner output. Runs the const-val
      # post-processor and re-evals to show the metric delta.
      - run: ./gradlew :eval:run --args="fixtures/edge-converted reports/edge-raw.md"
      - run: ./gradlew :eval:run --args="fix-const-val fixtures/edge-converted"
      - run: ./gradlew :eval:run --args="fixtures/edge-converted reports/edge-fixed.md"
      # restore the committed fixture so a re-run is reproducible
      - run: git checkout -- fixtures/edge-converted
      - uses: actions/upload-artifact@v4
        with:
          name: edge-fixtures-eval
          path: reports/

  runner-builds:
    name: runner plugin compiles + plugin.xml validates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - uses: actions/cache@v4
        with:
          path: .intellijPlatform
          key: intellij-platform-2024.3-${{ runner.os }}
      # Compile + verifyPluginProjectConfiguration. Doesn't boot the IDE.
      # This catches API drift (e.g. someone bumps IntelliJ Platform version
      # and JavaToKotlinAction.Handler signature changes) without paying
      # the runIde tax.
      - run: ./gradlew :runner:compileKotlin :runner:verifyPluginProjectConfiguration
