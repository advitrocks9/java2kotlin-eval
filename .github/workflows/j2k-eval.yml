name: j2k-eval

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Two pieces:
#  - newj2k-cross-check is the cheap path. No IDE boot, no plugin. Just
#    fetches a 15-pair sample of authentic J2K output from intellij-community,
#    eval module + post-processor unit tests, isolated kotlinc per file
#    (the testData fixtures share top-level class names, so a module-wide
#    compile would explode with redeclaration errors that say nothing
#    about J2K).
#  - edge-cases and jcommander both run the runner plugin, which boots a
#    full IntelliJ IDEA Community 2024.3 in headless mode under xvfb.

jobs:
  newj2k-cross-check:
    name: newJ2k testData cross-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - run: bash scripts/fetch-newj2k-fixtures.sh
      - run: ./gradlew :eval:test
      - run: ./gradlew :eval:run --args="fixtures/newj2k reports/newj2k.md --isolated"
      - uses: actions/upload-artifact@v4
        with:
          name: newj2k-cross-check
          path: reports/

  edge-cases:
    name: edge-case dataset (runIde under xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - name: install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      # ipgp v2 caches the IntelliJ IDEA distribution under .intellijPlatform/.
      # Without this cache every cold run pays a ~2GB IDE download.
      - uses: actions/cache@v4
        with:
          path: .intellijPlatform
          key: intellij-platform-2024.3-${{ runner.os }}
      - name: run-edge-cases under xvfb
        run: xvfb-run -a bash scripts/run-edge-cases.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: edge-case-reports
          path: |
            reports/
            runner/build/idea-sandbox/IC-2024.3/log/idea.log

  jcommander:
    name: cbeust/jcommander conversion (runIde under xvfb)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - name: install xvfb
        run: sudo apt-get update && sudo apt-get install -y xvfb
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - uses: actions/cache@v4
        with:
          path: .intellijPlatform
          key: intellij-platform-2024.3-${{ runner.os }}
      - name: run-jcommander-eval under xvfb
        run: xvfb-run -a bash scripts/run-jcommander-eval.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jcommander-reports
          path: |
            reports/
            runner/build/idea-sandbox/IC-2024.3/log/idea.log
