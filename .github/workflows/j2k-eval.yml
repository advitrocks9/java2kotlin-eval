name: j2k-eval

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      target_repo:
        description: "Java repo to convert (default: cbeust/jcommander)"
        required: false
        default: "cbeust/jcommander"

jobs:
  edge-cases:
    name: edge-case dataset (15 hand-written hypotheses)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - run: bash scripts/run-edge-cases.sh
      - uses: actions/upload-artifact@v4
        with:
          name: edge-case-reports
          path: reports/

  newj2k-cross-check:
    name: cross-check vs JetBrains' newJ2k testData
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - run: bash scripts/fetch-newj2k-fixtures.sh
      - run: ./gradlew :eval:test
      - run: ./gradlew :eval:run --args="fixtures/newj2k reports/newj2k.md"
      - uses: actions/upload-artifact@v4
        with:
          name: newj2k-cross-check
          path: reports/

  jcommander:
    name: full conversion of cbeust/jcommander
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: install kotlinc
        run: |
          curl -sLo /tmp/kotlin.zip https://github.com/JetBrains/kotlin/releases/download/v2.0.21/kotlin-compiler-2.0.21.zip
          unzip -q /tmp/kotlin.zip -d /opt
          echo "/opt/kotlinc/bin" >> $GITHUB_PATH
      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
      - run: bash scripts/run-jcommander-eval.sh
      - uses: actions/upload-artifact@v4
        with:
          name: jcommander-reports
          path: reports/
